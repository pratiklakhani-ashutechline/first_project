<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Premium App</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="auth-overlay">
        <div class="container">
            <h1>Reset Password</h1>
            <p class="subtitle" id="subtitleText">Enter your email to receive a secure code</p>

            <!-- Step 1: Send OTP Form -->
            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>

                <button type="submit" id="sendOtpBtn" class="btn-primary">
                    Send Code
                </button>
            </form>

            <!-- Step 2: Reset Password Form (Hidden Initially) -->
            <form id="resetForm" style="display: none;">
                <div class="form-group">
                    <label for="otp">Enter 6-Digit Code</label>
                    <input type="text" id="otp" placeholder="123456" pattern="[0-9]{6}" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" id="resetBtn" class="btn-primary">
                    Update Password
                </button>
            </form>

            <div id="message"></div>

            <p class="footer-text">
                Remember your password? <a href="/login">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        // Step 1 Elements
        const forgotForm = document.getElementById('forgotForm');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const emailInput = document.getElementById('email');

        // Step 2 Elements
        const resetForm = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');
        const otpInput = document.getElementById('otp');
        const newPasswordInput = document.getElementById('newPassword');
        
        // Shared Elements
        const messageBox = document.getElementById('message');
        const subtitleText = document.getElementById('subtitleText');

        let userEmail = '';

        // Handle sending OTP
        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            userEmail = emailInput.value.trim();

            messageBox.textContent = '';
            messageBox.className = '';
            sendOtpBtn.disabled = true;
            sendOtpBtn.innerHTML = '<span class="spinner"></span>Sending...';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                const data = await response.json();

                if (response.ok) {
                    messageBox.textContent = data.message || 'OTP sent successfully ✅';
                    messageBox.className = 'success';
                    
                    // Transition UI to Step 2
                    forgotForm.style.display = 'none';
                    resetForm.style.display = 'block';
                    subtitleText.textContent = `A code was sent to ${userEmail}`;
                    
                    // Clear success message after brief delay so it doesn't stay there forever
                    setTimeout(() => {
                        messageBox.textContent = '';
                        messageBox.className = '';
                    }, 4000);
                } else {
                    messageBox.textContent = data.message || 'Failed to send OTP ❌';
                    messageBox.className = 'error';
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.innerHTML = 'Send Code';
                }
            } catch (error) {
                messageBox.textContent = 'Something went wrong. Please try again later.';
                messageBox.className = 'error';
                sendOtpBtn.disabled = false;
                sendOtpBtn.innerHTML = 'Send Code';
            }
        });

        // Handle resetting password
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const otpValue = otpInput.value.trim();
            const passwordValue = newPasswordInput.value;

            messageBox.textContent = '';
            messageBox.className = '';
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="spinner"></span>Updating...';

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: userEmail,
                        otp: otpValue,
                        newPassword: passwordValue
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    messageBox.textContent = data.message || 'Password updated successful ✅';
                    messageBox.className = 'success';

                    // Redirect to login page after success!
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    messageBox.textContent = data.message || 'Reset failed ❌';
                    messageBox.className = 'error';
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = 'Update Password';
                }
            } catch (error) {
                messageBox.textContent = 'Something went wrong. Please try again later.';
                messageBox.className = 'error';
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Update Password';
            }
        });
    </script>
</body>

</html>
